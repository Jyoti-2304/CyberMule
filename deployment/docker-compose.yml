version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fraud_detection_db
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_password
      POSTGRES_DB: fraud_detection_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for alerts and logs
  mongodb:
    image: mongo:6.0
    container_name: fraud_detection_mongo
    environment:
      MONGO_INITDB_DATABASE: fraud_detection
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud_detection_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud_detection_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud_detection_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: fraud_detection_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Fraud Detection API
  api:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: fraud_detection_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud_password@postgres:5432/fraud_detection_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGODB_URI: mongodb://mongodb:27017
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      mongodb:
        condition: service_healthy
    command: python -m src.api
    volumes:
      - .:/app

  # Stream Processor
  stream_processor:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: fraud_detection_processor
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud_password@postgres:5432/fraud_detection_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGODB_URI: mongodb://mongodb:27017
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    command: python -m src.real_time_processing
    volumes:
      - .:/app

volumes:
  postgres_data:
  mongodb_data:
  prometheus_data:
  grafana_data:
