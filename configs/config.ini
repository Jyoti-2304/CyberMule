# Main configuration for fraud detection

[app]
name = Bank Fraud Detection
version = 1.0.0
environment = development
debug = false
log_level = INFO

[database]
type = postgresql
host = localhost
port = 5432
user = fraud_user
password = fraud_password
database = fraud_detection_db
pool_size = 20
max_overflow = 40

[mongodb]
uri = mongodb://localhost:27017
database = fraud_detection
connection_timeout = 5000

[kafka]
bootstrap_servers = localhost:9092
group_id = fraud-detection
transaction_topic = transactions
alert_topic = fraud_alerts
result_topic = fraud_detection_results
auto_offset_reset = earliest

[api]
host = 0.0.0.0
port = 8000
debug = false
reload = false
workers = 4

[models]
transaction_model_path = models/transaction_anomaly_detector.pkl
mule_account_model_path = models/mule_account_detector.pkl
fraud_threshold = 0.5
mule_threshold = 0.6

[monitoring]
prometheus_enabled = true
prometheus_port = 8001
sentry_enabled = false
sentry_environment = development

[logging]
level = INFO
format = json
file = logs/fraud_detection.log
max_size = 10485760
backup_count = 10

[security]
jwt_enabled = true
api_key_required = true
enable_cors = true

[validation]
enable_strict = true
max_transaction_amount = 999999999
min_transaction_amount = 0
